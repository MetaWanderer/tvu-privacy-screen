<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>TVU GO — Privacy Screen (Vertical)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #07090d;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  }

  .screen {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #07090d;
  }

  /* ── Background glow — breathes ── */
  .bg-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 62% 56% at 50% 58%, rgba(42,201,58,0.09) 0%, transparent 72%);
    animation: glowBreathe 10s ease-in-out infinite;
  }
  @keyframes glowBreathe {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1;   }
  }

  /* ── Dot grid ── */
  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* ── Scan lines ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px);
    pointer-events: none;
  }

  /* ── Sweep line ── */
  .sweep-glow {
    position: absolute;
    left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, transparent 0%, rgba(42,201,58,0.04) 50%, rgba(42,201,58,0.10) 100%);
    animation: sweepTravel 8s linear infinite;
    opacity: 0;
  }
  .sweep-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(42,201,58,0.45) 15%, rgba(42,201,58,0.85) 50%, rgba(42,201,58,0.45) 85%, transparent 100%);
    animation: sweepTravel 8s linear infinite;
    opacity: 0;
  }
  @keyframes sweepTravel {
    0%   { top: -82px;  opacity: 0;   }
    5%   { top: -28px;  opacity: 1;   }
    72%  { top: 1890px; opacity: 1;   }
    80%  { top: 1922px; opacity: 0;   }
    81%  { top: -82px;  opacity: 0;   }
    100% { top: -82px;  opacity: 0;   }
  }

  /* ── Corners ── */
  .corner-tl {
    position: absolute; top: 0; left: 0;
    width: 220px; height: 220px;
    background: linear-gradient(135deg, rgba(42,201,58,0.09) 0%, transparent 70%);
    animation: glowBreathe 10s ease-in-out infinite;
  }
  .corner-br {
    position: absolute; bottom: 0; right: 0;
    width: 220px; height: 220px;
    background: linear-gradient(315deg, rgba(42,201,58,0.07) 0%, transparent 70%);
    animation: glowBreathe 10s ease-in-out infinite;
  }

  /* ── Borders ── */
  .border-top, .border-bottom {
    position: absolute; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(42,201,58,0.5), rgba(42,201,58,0.75), rgba(42,201,58,0.5), transparent);
    overflow: hidden;
  }
  .border-top    { top: 0; }
  .border-bottom { bottom: 0; }

  /* Shimmer travelers — two per border offset by 50% */
  .border-top::before, .border-top::after,
  .border-bottom::before, .border-bottom::after {
    content: '';
    position: absolute;
    top: 0; height: 3px; width: 20%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  }
  .border-top::before    { animation: shimA 7s linear infinite; }
  .border-top::after     { animation: shimA 7s linear infinite; animation-delay: -3.5s; }
  .border-bottom::before { animation: shimB 7s linear infinite; animation-delay: -1.75s; }
  .border-bottom::after  { animation: shimB 7s linear infinite; animation-delay: -5.25s; }

  @keyframes shimA {
    from { left: -20%; }
    to   { left: 120%; }
  }
  @keyframes shimB {
    from { left: -20%; }
    to   { left: 120%; }
  }

  /* ── Center content ── */
  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 1.2s ease-out forwards, floatY 9s ease-in-out infinite 1.2s;
    opacity: 0;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(0px); }
    to   { opacity: 1; transform: translateY(0px); }
  }
  @keyframes floatY {
    0%, 100% { transform: translateY(0px);  }
    50%       { transform: translateY(-5px); }
  }

  /* ── Lock icon ── */
  .lock-wrap {
    position: relative;
    width: 110px; height: 110px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 44px;
  }
  .lock-glow {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(42,201,58,0.22) 0%, transparent 70%);
    animation: lockGlow 5s ease-in-out infinite;
  }
  .lock-circle {
    position: relative;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: rgba(42,201,58,0.08);
    border: 2px solid rgba(42,201,58,0.3);
    display: flex; align-items: center; justify-content: center;
    animation: lockPulse 5s ease-in-out infinite;
  }
  @keyframes lockGlow {
    0%, 100% { opacity: 0.5; transform: scale(0.95); }
    50%       { opacity: 1;   transform: scale(1.05); }
  }
  @keyframes lockPulse {
    0%, 100% { transform: scale(0.96); border-color: rgba(42,201,58,0.20); }
    50%       { transform: scale(1.00); border-color: rgba(42,201,58,0.55); }
  }

  /* ── Text ── */
  .eyebrow {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.30em; text-transform: uppercase;
    color: #2AC93A; margin-bottom: 24px; opacity: 0.85;
  }
  .headline {
    font-size: 72px; font-weight: 800;
    letter-spacing: -0.025em; color: #ffffff;
    line-height: 1.0; margin-bottom: 16px;
  }
  .enabled {
    font-size: 72px; font-weight: 300;
    letter-spacing: -0.025em; color: #2AC93A;
    line-height: 1.0; margin-bottom: 52px;
    animation: enabledBreathe 6s ease-in-out infinite 1.2s;
  }
  @keyframes enabledBreathe {
    0%, 100% { opacity: 0.75; }
    50%       { opacity: 1.0;  }
  }
  .separator {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(42,201,58,0.4), transparent);
    margin-bottom: 44px;
    animation: sepBreathe 10s ease-in-out infinite;
  }
  @keyframes sepBreathe {
    0%, 100% { width: 440px; }
    50%       { width: 520px; }
  }
  .tagline {
    font-size: 26px; font-weight: 300;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.65);
  }

  /* ── Logo ── */
  .logo {
    position: absolute;
    bottom: 56px;
    left: 50%; transform: translateX(-50%);
    width: 148px;
    animation: logoBreathe 10s ease-in-out infinite;
  }
  @keyframes logoBreathe {
    0%, 100% { opacity: 0.45; }
    50%       { opacity: 0.57; }
  }

  /* ── LIVE badge ── */
  .live-badge {
    position: absolute;
    top: 44px; right: 56px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(42,201,58,0.10);
    border: 1px solid rgba(42,201,58,0.28);
    border-radius: 100px;
    padding: 8px 18px;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2AC93A;
    animation: livePulse 1.2s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 1.0; }
  }
  .live-text {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #2AC93A;
  }

  /* ── Wordmark ── */
  .wordmark {
    position: absolute;
    top: 44px; left: 56px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.22);
  }
</style>
</head>
